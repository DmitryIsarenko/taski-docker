server {
  listen 80;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_upstream http://backend:8000;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass $backend_upstream/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass $backend_upstream/admin/;
  }

  location / {
    alias /staticfiles/;
    index index.html;
  }
}