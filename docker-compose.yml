volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13.10
    container_name: db
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/
    container_name: back
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/backend_static
  frontend:
    container_name: front
    env_file: .env
    build: ./frontend/
  gateway:
    build: ./gateway/
    ports:
      - 8000:80
    volumes:
      - static:/staticfiles